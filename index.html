<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;


/*
 * ╔═══════════════════════════════════════════════╗
 * ║  MON RELEVÉ — Release v1.0                    ║
 * ║  Dark Premium Theme                           ║
 * ║                                               ║
 * ║  Changelog:                                   ║
 * ║  v1.0   — Release production                  ║
 * ╚═══════════════════════════════════════════════╝
 */
const VERSION = "1.0";

// ── Timing constants ──
const TOAST_DURATION_MS = 2000;
const DOWNLOAD_CLEANUP_MS = 1000;
const MS_PER_DAY = 864e5;
const WORKDAYS_PER_WEEK = 5;
const DEFAULT_OBJ_HOURS = 35;

// ── Pause defaults ──
const DEFAULT_PAUSE_MATIN_HEURE = "10:00";
const DEFAULT_PAUSE_MATIN_FIN = "10:15";
const DEFAULT_PAUSE_MIDI_DEBUT = "12:30";
const DEFAULT_PAUSE_MIDI_FIN = "13:15";

// ── Layout constants ──
const R_LARGE = 30;
const R_CARD = 24;
const R_PILL = 999;

// ── Config ──
const JOURS = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];
const MOTIFS = ["Congé payé", "RTT", "Maladie", "Sans solde", "Formation", "Autre"];
const CONTRATS = ["CDI — 35h", "CDI — 39h", "CDI — Temps partiel", "CDD", "CDD — Temps partiel", "Apprentissage", "Intérim", "Autre"];
const H_OBJ = { "CDI — 35h": 35, "CDI — 39h": 39, "CDI — Temps partiel": 28, CDD: 35, "CDD — Temps partiel": 28, Apprentissage: 35, Intérim: 35, Autre: 35 };
const MOIS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
const MOIS_C = ["jan.", "fév.", "mars", "avr.", "mai", "juin", "juil.", "août", "sept.", "oct.", "nov.", "déc."];
const MOIS_U = ["JANVIER", "FÉVRIER", "MARS", "AVRIL", "MAI", "JUIN", "JUILLET", "AOÛT", "SEPTEMBRE", "OCTOBRE", "NOVEMBRE", "DÉCEMBRE"];

// ── Palette Dark ──
const P = {
  bg: "#0B1120",
  bgGrad: "radial-gradient(circle at top, #12213D 0%, #0B1120 60%)",
  card: "rgba(255,255,255,.05)",
  cardSolid: "#111827",
  glass: "rgba(255,255,255,.07)",
  glassBorder: "rgba(255,255,255,.12)",
  glassShadow: "0 8px 32px rgba(0,0,0,.22)",
  glassBlur: "blur(32px)",
  teal: "#2DD4A8",
  tealDim: "rgba(45,212,168,.12)",
  sky: "#38BDF8",
  blue: "#3B82F6",
  green: "#34D399",
  orange: "#FBBF24",
  red: "#EF4444",
  text: "#FFFFFF",
  sub: "rgba(255,255,255,.7)",
  muted: "rgba(255,255,255,.4)",
  dim: "rgba(255,255,255,.2)",
  border: "rgba(255,255,255,.08)",
};

// ── Icons ──
const sp = { fill: "none", strokeWidth: "1.8", strokeLinecap: "round", strokeLinejoin: "round" };
const IClock = ({ color = P.muted, size = 22 }) => <svg width={size} height={size} viewBox="0 0 24 24" stroke={color} {...sp}><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>;
const ICalX = ({ color = P.muted, size = 22 }) => <svg width={size} height={size} viewBox="0 0 24 24" stroke={color} {...sp}><rect x="3" y="4" width="18" height="18" rx="3" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /><line x1="10" y1="14" x2="14" y2="18" /><line x1="14" y1="14" x2="10" y2="18" /></svg>;
const IChart = ({ color = P.muted, size = 22 }) => <svg width={size} height={size} viewBox="0 0 24 24" stroke={color} {...sp}><rect x="3" y="12" width="4" height="9" rx="1" /><rect x="10" y="7" width="4" height="14" rx="1" /><rect x="17" y="3" width="4" height="18" rx="1" /></svg>;
const IDoc = ({ size = 16 }) => <svg width={size} height={size} viewBox="0 0 24 24" stroke={P.muted} {...sp}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /></svg>;
const IGear = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" stroke={P.sub} {...sp}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>;
const ICheck = ({ size = 14, color = P.teal }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>;

// ── Helpers ──
function getSem(d = new Date()) { d = new Date(d); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7)); const s1 = new Date(d.getFullYear(), 0, 4); return { y: d.getFullYear(), n: 1 + Math.round(((d - s1) / MS_PER_DAY - 3 + ((s1.getDay() + 6) % 7)) / 7) }; }
function getLun(d = new Date()) { d = new Date(d); const j = d.getDay(); d.setDate(d.getDate() - j + (j === 0 ? -6 : 1)); d.setHours(0, 0, 0, 0); return d; }
function getLunCle(c) { const [a, s] = [parseInt(c.split("-S")[0]), parseInt(c.split("-S")[1])]; const j = new Date(a, 0, 4); const dj = j.getDay() || 7; const l = new Date(j); l.setDate(j.getDate() - dj + 1 + (s - 1) * 7); l.setHours(0, 0, 0, 0); return l; }
function cleS(s) { return `${s.y}-S${String(s.n).padStart(2, "0")}`; }
function fU(d) { return `${d.getDate()} ${MOIS_U[d.getMonth()]}`; }
function fC(d) { return `${d.getDate()} ${MOIS_C[d.getMonth()]}`; }
function fF(d) { return `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}/${d.getFullYear()}`; }
function t2m(t) { if (!t) return 0; const [h, m] = t.split(":").map(Number); return h * 60 + m; }
function m2h(m) { if (m <= 0) return "0h00"; return `${Math.floor(m / 60)}h${String(m % 60).padStart(2, "0")}`; }
function cNet(a, d, cfg) { if (!a || !d) return 0; const am = t2m(a), dm = t2m(d); if (dm <= am) return 0; let b = dm - am; const m1 = t2m(cfg.pauseMatinHeure || DEFAULT_PAUSE_MATIN_HEURE), m2 = t2m(cfg.pauseMatinFin || DEFAULT_PAUSE_MATIN_FIN); if (m2 > m1 && am < m2 && dm > m1) b -= (Math.min(dm, m2) - Math.max(am, m1)); const p1 = t2m(cfg.pauseMidiDebut || DEFAULT_PAUSE_MIDI_DEBUT), p2 = t2m(cfg.pauseMidiFin || DEFAULT_PAUSE_MIDI_FIN); if (p2 > p1 && am < p2 && dm > p1) b -= (Math.min(dm, p2) - Math.max(am, p1)); return Math.max(0, b); }
function cPause(a, d, cfg) { if (!a || !d) return 0; const am = t2m(a), dm = t2m(d); if (dm <= am) return 0; let p = 0; const m1 = t2m(cfg.pauseMatinHeure || DEFAULT_PAUSE_MATIN_HEURE), m2 = t2m(cfg.pauseMatinFin || DEFAULT_PAUSE_MATIN_FIN); if (m2 > m1 && am < m2 && dm > m1) p += (Math.min(dm, m2) - Math.max(am, m1)); const p1 = t2m(cfg.pauseMidiDebut || DEFAULT_PAUSE_MIDI_DEBUT), p2 = t2m(cfg.pauseMidiFin || DEFAULT_PAUSE_MIDI_FIN); if (p2 > p1 && am < p2 && dm > p1) p += (Math.min(dm, p2) - Math.max(am, p1)); return p; }
function hNow() { const n = new Date(); return `${String(n.getHours()).padStart(2, "0")}:${String(n.getMinutes()).padStart(2, "0")}`; }
function tIdx() { const d = new Date().getDay(); return d >= 1 && d <= 5 ? d - 1 : -1; }
function semOff(o) { const d = new Date(); d.setDate(d.getDate() + o * 7); return { s: getSem(d), l: getLun(d) }; }
function salut() { const h = new Date().getHours(); return h < 12 ? "Bonjour" : h < 18 ? "Bon après-midi" : "Bonsoir"; }

// ── Storage ──
const PX = "mr_";
const vide = s => ({ cle: cleS(s), valide: false, valideA: null, jours: Array.from({ length: 5 }, () => ({ arrivee: "", depart: "", absence: false, motif: "", motifAutre: "" })) });

function ldSem(c, n) {
  try { const r = localStorage.getItem(`${PX}${n}_${c}`); if (r) { const d = JSON.parse(r); return { cle: d.cle || d.key || c, valide: d.valide !== undefined ? d.valide : !!d.v, valideA: d.valideA || d.at || null, jours: (d.jours || d.days || []).map(j => ({ arrivee: j.arrivee || j.a || "", depart: j.depart || j.d || "", absence: j.absence !== undefined ? j.absence : !!j.abs, motif: j.motif || j.mot || "", motifAutre: j.motifAutre || j.motA || "" })) }; } } catch (e) { console.warn(e); }
  return null;
}
function svSem(c, n, d) { try { localStorage.setItem(`${PX}${n}_${c}`, JSON.stringify(d)); } catch (e) { console.warn(e); } }
function delSem(c, n) { try { localStorage.removeItem(`${PX}${n}_${c}`); } catch {} }
function ldProf() { try { const r = localStorage.getItem(`${PX}prof`); if (r) { const p = JSON.parse(r); const matH = p.pauseMatinHeure || DEFAULT_PAUSE_MATIN_HEURE; let matF = p.pauseMatinFin; if (!matF && p.pauseMatinDuree !== undefined) { const mf = t2m(matH) + p.pauseMatinDuree; matF = `${String(Math.floor(mf/60)).padStart(2,"0")}:${String(mf%60).padStart(2,"0")}`; } return { nom: p.nom || p.name || "", contrat: p.contrat || "", entreprise: p.entreprise || p.co || "", pointageRapide: p.pointageRapide !== undefined ? p.pointageRapide : (p.quickStamp !== undefined ? p.quickStamp : true), pauseMatinHeure: matH, pauseMatinFin: matF || DEFAULT_PAUSE_MATIN_FIN, pauseMidiDebut: p.pauseMidiDebut || DEFAULT_PAUSE_MIDI_DEBUT, pauseMidiFin: p.pauseMidiFin || DEFAULT_PAUSE_MIDI_FIN }; } } catch {} return { nom: "", contrat: "", entreprise: "", pointageRapide: true, pauseMatinHeure: DEFAULT_PAUSE_MATIN_HEURE, pauseMatinFin: DEFAULT_PAUSE_MATIN_FIN, pauseMidiDebut: DEFAULT_PAUSE_MIDI_DEBUT, pauseMidiFin: DEFAULT_PAUSE_MIDI_FIN }; }
function svProf(p) { try { localStorage.setItem(`${PX}prof`, JSON.stringify(p)); } catch {} }
function allSem(n) { try { const pfx = `${PX}${n}_`; return Object.keys(localStorage).filter(k => k.startsWith(pfx)).map(k => { const c = k.slice(pfx.length); return { cle: c, data: ldSem(c, n) }; }).filter(w => w.data).sort((a, b) => b.cle.localeCompare(a.cle)); } catch { return []; } }

function mStats(n, ct, semNum, cfg) {
  const now = new Date(); const mo = now.getMonth(), yr = now.getFullYear();
  const obj = (H_OBJ[ct] || DEFAULT_OBJ_HOURS) * 60;
  return allSem(n).filter(({ cle }) => { const l = getLunCle(cle); return l.getFullYear() === yr && l.getMonth() === mo; }).map(({ cle, data }) => {
    const tot = data.jours.reduce((s, j) => j.absence ? s : s + cNet(j.arrivee, j.depart, cfg), 0);
    const abs = data.jours.filter(j => j.absence);
    const absMotifs = {};
    abs.forEach(j => { const m = j.motif === "Autre" ? (j.motifAutre || "Autre") : (j.motif || "Non précisé"); absMotifs[m] = (absMotifs[m] || 0) + 1; });
    const num = parseInt(cle.split("-S")[1]);
    return { num, tot, obj, diff: tot - obj, v: !!data.valide, cur: num === semNum, absCount: abs.length, absMotifs };
  }).sort((a, b) => a.num - b.num);
}

// ── Component ──
window.MonReleve = function MonReleve() {
  const [pr, setPr] = useState(ldProf);
  const [ok, setOk] = useState(() => { const p = ldProf(); return !!(p.nom && p.entreprise); });
  const [ed, setEd] = useState(false);
  const [off, setOff] = useState(0);
  const [wd, setWd] = useState(null);
  const [tab, setTab] = useState("heures");
  const [msg, setMsg] = useState("");
  const [pop, setPop] = useState(false);
  const [arch, setArch] = useState(null);
  const [cfDel, setCfDel] = useState(false);
  const [rk, setRk] = useState(0);

  const { s: sem, l: lun } = semOff(off);
  const ck = cleS(sem);
  const ven = new Date(lun.getTime() + 4 * MS_PER_DAY);
  const cur = off === 0;
  const ti = tIdx();
  const objM = (H_OBJ[pr.contrat] || DEFAULT_OBJ_HOURS) * 60;

  useEffect(() => { if (ok && pr.nom) setWd(ldSem(ck, pr.nom) || vide(sem)); }, [ck, pr.nom, ok, rk]);

  const sv = useCallback(d => { setWd(d); svSem(ck, pr.nom, d); }, [ck, pr.nom]);
  const toastRef = useRef(null);
  const flash = m => { setMsg(m); if (toastRef.current) clearTimeout(toastRef.current); toastRef.current = setTimeout(() => setMsg(""), TOAST_DURATION_MS); };
  useEffect(() => () => { if (toastRef.current) clearTimeout(toastRef.current); }, []);
  const mj = (i, f, v) => { if (!wd) return; const nj = wd.jours.map((j, k) => { if (k !== i) return j; const u = { ...j, [f]: v }; if (f === "absence" && !v) { u.motif = ""; u.motifAutre = ""; } return u; }); sv({ ...wd, jours: nj }); };
  const pointer = (i, f) => { mj(i, f, hNow()); flash(`${f === "arrivee" ? "Arrivée" : "Départ"} ${hNow()}`); };
  const valider = () => { if (!wd) return; sv({ ...wd, valide: true, valideA: new Date().toISOString() }); setPop(true); flash("Semaine validée ✓"); };

  const totMin = wd ? wd.jours.reduce((s, j) => j.absence ? s : s + cNet(j.arrivee, j.depart, pr), 0) : 0;
  const hasD = wd && wd.jours.some(j => j.arrivee || j.depart || j.absence);
  const pct = Math.min(100, Math.round(totMin / objM * 100));
  const prenom = (pr.nom || "").split(" ")[0] || pr.nom;
  const showQ = pr.pointageRapide !== false;

  const exporter = () => { const b = new Blob([JSON.stringify({ version: VERSION, profile: ldProf(), weeks: allSem(pr.nom), at: new Date().toISOString() }, null, 2)], { type: "application/json" }); const a = document.createElement("a"); const url = URL.createObjectURL(b); a.href = url; a.download = `mon-releve-${pr.nom.replace(/\s+/g, "-")}-${new Date().toISOString().slice(0, 10)}.json`; a.click(); setTimeout(() => URL.revokeObjectURL(url), DOWNLOAD_CLEANUP_MS); flash("Sauvegarde ✓"); };
  const restaurer = () => { const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json"; inp.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); if (!d || typeof d !== "object" || !d.profile || typeof d.profile !== "object" || !Array.isArray(d.weeks)) throw new Error("Format invalide"); const pn = d.profile.nom || d.profile.name; if (!pn || typeof pn !== "string" || !pn.trim()) throw new Error("Nom manquant"); const p = { nom: pn.trim(), contrat: d.profile.contrat || "", entreprise: (d.profile.entreprise || d.profile.co || "").trim(), pointageRapide: d.profile.pointageRapide !== undefined ? d.profile.pointageRapide : true, pauseMatinHeure: d.profile.pauseMatinHeure || DEFAULT_PAUSE_MATIN_HEURE, pauseMatinFin: d.profile.pauseMatinFin || DEFAULT_PAUSE_MATIN_FIN, pauseMidiDebut: d.profile.pauseMidiDebut || DEFAULT_PAUSE_MIDI_DEBUT, pauseMidiFin: d.profile.pauseMidiFin || DEFAULT_PAUSE_MIDI_FIN }; svProf(p); let imported = 0; d.weeks.forEach(w => { if (!w || typeof w !== "object") return; const c = w.cle || w.key; if (!c || typeof c !== "string" || !w.data) return; svSem(c, p.nom, w.data); imported++; }); setPr(p); setOk(true); setRk(x => x + 1); flash(`Restauré ✓ (${imported} semaine${imported > 1 ? "s" : ""})`); } catch { flash("Fichier invalide"); } }; r.readAsText(f); }; inp.click(); };

  const stats = useMemo(() => ok ? mStats(pr.nom, pr.contrat, sem.n, pr) : [], [pr.nom, pr.contrat, ok, rk, ck, sem.n, pr.pauseMatinHeure, pr.pauseMatinFin, pr.pauseMidiDebut, pr.pauseMidiFin]);
  const mTot = stats.reduce((s, w) => s + w.tot, 0);
  const mObj = stats.length * objM;
  const mDiff = mTot - mObj;
  const mPct = mObj > 0 ? Math.min(100, Math.round(mTot / mObj * 100)) : 0;
  const mAbsTotal = stats.reduce((s, w) => s + w.absCount, 0);
  const mAbsDetail = useMemo(() => {
    const agg = {};
    stats.forEach(w => { Object.entries(w.absMotifs).forEach(([m, c]) => { agg[m] = (agg[m] || 0) + c; }); });
    return Object.entries(agg).sort((a, b) => b[1] - a[1]);
  }, [stats]);

  // ── Chart ──
  const Chart = useMemo(() => function ChartInner() {
    if (!stats.length) return <div style={{ color: P.muted, fontSize: 13, textAlign: "center", padding: 20 }}>Aucune donnée</div>;
    const mx = Math.max(...stats.map(s => Math.max(s.tot, s.obj)));
    return (<div>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {stats.map((w, i) => {
          const pc = mx > 0 ? Math.round(w.tot / mx * 100) : 0;
          const op = mx > 0 ? Math.round(w.obj / mx * 100) : 0;
          const col = w.tot > w.obj ? P.teal : (w.cur || !w.v) ? P.blue : P.orange;
          return (<div key={i}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: P.text }}>S{w.num}</span>
              <span style={{ fontSize: 12, fontWeight: 600, color: col }}>{m2h(w.tot)}<span style={{ color: P.muted, fontWeight: 400 }}> / {m2h(w.obj)}</span></span>
            </div>
            <div style={{ height: 8, borderRadius: 4, background: P.card, position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", left: `${op}%`, top: 0, bottom: 0, width: 1.5, background: P.muted, opacity: .4, zIndex: 2 }} />
              <div style={{ height: "100%", borderRadius: 4, background: col, width: `${Math.min(100, pc)}%`, transition: "width .4s" }} />
            </div>
          </div>);
        })}
      </div>
      <div style={{ display: "flex", justifyContent: "center", gap: 14, marginTop: 14, flexWrap: "wrap" }}>
        {[["En cours", P.blue], ["Heures supp.", P.teal], ["Sous objectif", P.orange]].map(([l, c]) => (
          <div key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}><div style={{ width: 8, height: 8, borderRadius: 4, background: c }} /><span style={{ fontSize: 10, color: P.sub }}>{l}</span></div>
        ))}
      </div>
    </div>);
  }, [stats, sem.n]);

  // ── PDF (fond blanc pour impression) ──
  const Releve = ({ data, ck: ck2, l: l2, v: v2 }) => {
    let cu = 0;
    const pk = { bg: "#fff", text: "#111827", sub: "#6B7280", muted: "#9CA3AF", accent: "#0D7377", border: "#E5E7EB", orange: "#D97706" };
    return (<div style={{ background: pk.bg, margin: 16, borderRadius: 20, padding: 20, boxShadow: "0 4px 24px rgba(0,0,0,.2)", fontSize: 12, lineHeight: 1.6, overflowX: "auto", color: pk.text }}>

        <div><div style={{ fontSize: 15, fontWeight: 700, color: pk.text }}>{pr.entreprise}</div><div style={{ fontSize: 10, color: pk.sub, marginTop: 2 }}>Relevé d'heures hebdomadaire</div></div>
        <div style={{ textAlign: "right" }}><div style={{ fontSize: 12, fontWeight: 600, color: pk.text }}>{pr.nom}</div><div style={{ fontSize: 10, color: pk.accent, fontWeight: 600, marginTop: 2 }}>{pr.contrat}</div><div style={{ fontSize: 11, fontWeight: 700, marginTop: 4, color: pk.text }}>{ck2}</div><div style={{ fontSize: 9, color: pk.sub }}>{fF(l2)} — {fF(v2)}</div></div>
      </div>
      <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 8, fontSize: 10, tableLayout: "fixed" }}>
        <thead><tr>{["Jour", "Date", "Arrivée", "Départ", "Pause", "Net"].map((h, i) => <th key={h} style={{ padding: "8px 4px", fontSize: 8, fontWeight: 700, textTransform: "uppercase", letterSpacing: .5, textAlign: i === 0 ? "left" : "center", color: pk.sub, borderBottom: `2px solid ${pk.text}` }}>{h}</th>)}</tr></thead>
        <tbody>
          {data.jours.map((j, i) => { const d = new Date(l2); d.setDate(d.getDate() + i);
            if (j.absence) { const mt = j.motif === "Autre" ? (j.motifAutre || "Autre") : j.motif; return (<tr key={i} style={{ background: "#FFF8F0" }}><td style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "left", fontWeight: 600, color: pk.text, fontSize: 10 }}>{JOURS[i]}</td><td style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "center", fontSize: 10, color: pk.text }}>{fF(d)}</td><td colSpan={3} style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "center", fontSize: 10, color: pk.orange, fontWeight: 500 }}>{mt}</td><td style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "center", fontSize: 10, color: pk.text }}>—</td></tr>); }
            const n = cNet(j.arrivee, j.depart, pr); cu += n;
            return (<tr key={i} style={i % 2 ? { background: "#FAFBFC" } : {}}><td style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "left", fontWeight: 600, color: pk.text, fontSize: 10 }}>{JOURS[i]}</td><td style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "center", fontSize: 10, color: pk.text }}>{fF(d)}</td><td style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "center", fontSize: 10, color: pk.text }}>{j.arrivee || "—"}</td><td style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "center", fontSize: 10, color: pk.text }}>{j.depart || "—"}</td><td style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "center", fontSize: 10, color: pk.text }}>{j.arrivee && j.depart ? m2h(cPause(j.arrivee, j.depart, pr)) : "—"}</td><td style={{ padding: "8px 4px", borderBottom: `1px solid ${pk.border}`, textAlign: "center", fontSize: 10, fontWeight: 700, color: pk.text }}>{j.arrivee && j.depart ? m2h(n) : "—"}</td></tr>);
          })}
          <tr><td colSpan={5} style={{ padding: "8px 4px", textAlign: "right", fontWeight: 700, borderTop: `2px solid ${pk.text}`, borderBottom: "none", color: pk.text }}>TOTAL</td><td style={{ padding: "8px 4px", fontWeight: 800, fontSize: 14, borderTop: `2px solid ${pk.text}`, borderBottom: "none", color: pk.text }}>{m2h(cu)}</td></tr>
        </tbody>
      </table>
      <div style={{ fontSize: 9, color: pk.muted, marginTop: 10 }}>Pauses : {pr.pauseMatinHeure || DEFAULT_PAUSE_MATIN_HEURE}–{pr.pauseMatinFin || DEFAULT_PAUSE_MATIN_FIN} + {pr.pauseMidiDebut || DEFAULT_PAUSE_MIDI_DEBUT}–{pr.pauseMidiFin || DEFAULT_PAUSE_MIDI_FIN}</div>
      {data.valideA && <div style={{ fontSize: 10, color: pk.accent, marginTop: 6, fontWeight: 600 }}>✓ Validé le {new Date(data.valideA).toLocaleDateString("fr-FR")} à {new Date(data.valideA).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" })}</div>}
      <div style={{ display: "flex", gap: 14, marginTop: 24 }}><div style={{ flex: 1, border: `1px solid ${pk.border}`, borderRadius: 10, padding: 14, minHeight: 60 }}><div style={{ fontSize: 8, color: pk.muted, textTransform: "uppercase", letterSpacing: .5 }}>Signature salarié</div></div><div style={{ flex: 1, border: `1px solid ${pk.border}`, borderRadius: 10, padding: 14, minHeight: 60 }}><div style={{ fontSize: 8, color: pk.muted, textTransform: "uppercase", letterSpacing: .5 }}>Signature responsable</div></div></div>
      <div style={{ fontSize: 8, color: pk.muted, marginTop: 14, textAlign: "right" }}>Mon Relevé v{VERSION}</div>
    </div>);
  };

  // ── Setup ──
  if (!ok || ed) { return (
    <div style={st.app}><div style={st.setup}>
      <IClock color={P.teal} size={48} />
      <h1 style={{ fontSize: 28, fontWeight: 800, color: P.text, margin: "8px 0 0" }}>Mon Relevé</h1>
      <p style={{ fontSize: 14, color: P.sub, marginBottom: 20 }}>Votre suivi d'heures personnel</p>
      <div style={st.sCard}>
        <div style={st.fg}><label style={st.fl}>Entreprise</label><input type="text" placeholder="Nom" value={pr.entreprise || ""} onChange={e => setPr({ ...pr, entreprise: e.target.value })} style={st.fi} autoFocus /></div>
        <div style={st.fg}><label style={st.fl}>Nom complet</label><input type="text" placeholder="Prénom Nom" value={pr.nom} onChange={e => setPr({ ...pr, nom: e.target.value })} style={st.fi} /></div>
        <div style={st.fg}><label style={st.fl}>Contrat</label><select value={pr.contrat} onChange={e => setPr({ ...pr, contrat: e.target.value })} style={st.fs}><option value="">— Sélectionner —</option>{CONTRATS.map(c => <option key={c} value={c}>{c}</option>)}</select></div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 14, borderTop: `1px solid ${P.border}` }}>
          <div><div style={{ fontSize: 14, fontWeight: 600, color: P.text }}>Pointage rapide</div><div style={{ fontSize: 12, color: P.sub, marginTop: 2 }}>Arrivée / Départ du jour</div></div>
          <button onClick={() => setPr({ ...pr, pointageRapide: !pr.pointageRapide })} style={{ width: 51, height: 31, borderRadius: 16, border: "none", cursor: "pointer", position: "relative", background: pr.pointageRapide !== false ? P.teal : P.dim, transition: "background .2s" }}>
            <div style={{ width: 27, height: 27, borderRadius: 14, background: "#fff", boxShadow: "0 1px 3px rgba(0,0,0,.3)", position: "absolute", top: 2, left: pr.pointageRapide !== false ? 22 : 2, transition: "left .2s" }} />
          </button>
        </div>
        {/* Pause settings */}
        <div style={{ paddingTop: 18, marginTop: 18, borderTop: `1px solid ${P.border}` }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: P.text, marginBottom: 4 }}>Pauses déduites</div>
          <div style={{ fontSize: 12, color: P.sub, marginBottom: 16 }}>Configurez les pauses automatiques</div>
          <div style={{ ...GL, borderRadius: 20, padding: 16, marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: P.text, marginBottom: 10 }}>Pause matin</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, paddingRight: 2 }}>
              <div>
                <div style={st.iL}>Début</div>
                <input type="time" value={pr.pauseMatinHeure || DEFAULT_PAUSE_MATIN_HEURE} onChange={e => setPr({ ...pr, pauseMatinHeure: e.target.value })} style={st.tI} />
              </div>
              <div>
                <div style={st.iL}>Fin</div>
                <input type="time" value={pr.pauseMatinFin || DEFAULT_PAUSE_MATIN_FIN} onChange={e => setPr({ ...pr, pauseMatinFin: e.target.value })} style={st.tI} />
              </div>
            </div>
          </div>
          <div style={{ ...GL, borderRadius: 20, padding: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: P.text, marginBottom: 10 }}>Pause midi</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, paddingRight: 2 }}>
              <div>
                <div style={st.iL}>Début</div>
                <input type="time" value={pr.pauseMidiDebut || DEFAULT_PAUSE_MIDI_DEBUT} onChange={e => setPr({ ...pr, pauseMidiDebut: e.target.value })} style={st.tI} />
              </div>
              <div>
                <div style={st.iL}>Fin</div>
                <input type="time" value={pr.pauseMidiFin || DEFAULT_PAUSE_MIDI_FIN} onChange={e => setPr({ ...pr, pauseMidiFin: e.target.value })} style={st.tI} />
              </div>
            </div>
          </div>
        </div>
      </div>
      <button onClick={() => { if (pr.nom.trim() && pr.contrat && (pr.entreprise || "").trim()) { svProf({ ...pr, nom: pr.nom.trim(), entreprise: pr.entreprise.trim() }); setOk(true); setEd(false); } }} style={{ ...st.cta, width: "100%", opacity: pr.nom.trim() && pr.contrat && (pr.entreprise || "").trim() ? 1 : .3 }} disabled={!pr.nom.trim() || !pr.contrat || !(pr.entreprise || "").trim()}>{ed ? "Enregistrer" : "Commencer"}</button>
      {ed && <button onClick={() => setEd(false)} style={{ ...st.sec, width: "100%", marginTop: 10 }}>Annuler</button>}
      {!ed && <button onClick={restaurer} style={{ ...st.sec, width: "100%", marginTop: 10 }}>Restaurer une sauvegarde</button>}
      <div style={{ fontSize: 10, color: P.dim, marginTop: 14 }}>v{VERSION}</div>
    </div></div>
  ); }

  if (!wd) return null;

  // ── Popup ──
  if (pop) { return (
    <div style={st.app}>
      <div style={st.topBar}><button onClick={() => setPop(false)} style={st.topBtn}>← Retour</button><button onClick={() => window.print()} style={st.topAct}>PDF</button></div>
      <Releve data={wd} ck={ck} l={lun} v={ven} />
      <div style={{ padding: "0 16px 32px" }}>
        <button onClick={() => { const su = encodeURIComponent(`Relevé heures ${ck} — ${pr.nom}`); const bo = encodeURIComponent(`Bonjour,\n\nVeuillez trouver ci-joint mon relevé d'heures pour la semaine ${ck}.\n\nCordialement,\n${pr.nom}`); window.open(`mailto:?subject=${su}&body=${bo}`, "_self"); }} style={{ ...st.cta, width: "100%" }}>Envoyer par mail</button>
        <p style={{ fontSize: 12, color: P.sub, textAlign: "center", marginTop: 14 }}>Sauvegardez le PDF, puis joignez-le au mail.</p>
      </div>
    </div>
  ); }

  // ── Archive detail ──
  if (arch) { const al = getLunCle(arch.cle); return (
    <div style={st.app}>
      <div style={st.topBar}><button onClick={() => { setArch(null); setCfDel(false); }} style={st.topBtn}>← Historique</button><button onClick={() => window.print()} style={st.topAct}>PDF</button></div>
      <Releve data={arch.data} ck={arch.cle} l={al} v={new Date(al.getTime() + 4 * MS_PER_DAY)} />
      <div style={{ padding: "0 16px 32px" }}>
        {!cfDel ? <button onClick={() => setCfDel(true)} style={{ ...st.sec, width: "100%", color: P.red }}>Supprimer ce relevé</button>
          : <div style={{ background: "rgba(239,68,68,.1)", borderRadius: 18, padding: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: P.text, textAlign: "center", marginBottom: 12 }}>Supprimer {arch.cle} ?</div>
            <div style={{ display: "flex", gap: 10 }}><button onClick={() => setCfDel(false)} style={{ ...st.sec, flex: 1 }}>Annuler</button><button onClick={() => { delSem(arch.cle, pr.nom); setArch(null); setCfDel(false); setRk(x => x + 1); flash("Supprimé"); }} style={{ ...st.sec, flex: 1, background: P.red, color: "#fff" }}>Supprimer</button></div>
          </div>}
      </div>
    </div>
  ); }

  // ── Main ──
  return (
    <div style={st.app}>
      {msg && <div style={st.toast}>{msg}</div>}

      <div style={st.header}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div>
            <div style={{ fontSize: 17, color: P.sub, fontWeight: 500 }}>{salut()}</div>
            <div style={{ fontSize: 26, fontWeight: 800, color: P.text, marginTop: 1 }}>{prenom}</div>
          </div>
          <button onClick={() => setEd(true)} style={st.gearBtn}><IGear /></button>
        </div>
        <div style={{ background: P.card, borderRadius: 14, padding: "10px 4px", border: `1px solid ${P.border}` }}>
          <div style={st.wRow}>
            <button onClick={() => setOff(o => o - 1)} style={st.wA}>◀</button>
            <div style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: P.teal, letterSpacing: 1.5 }}>SEMAINE {sem.n}</div>
              <div style={{ fontSize: 12, color: P.sub, marginTop: 2 }}>{fU(lun)} – {fU(ven)}</div>
            </div>
            <button onClick={() => setOff(o => o + 1)} style={st.wA}>▶</button>
          </div>
        </div>
      </div>

      {!cur && <div style={{ padding: "0 16px" }}><button onClick={() => setOff(0)} style={st.offW}>Autre semaine · Revenir à aujourd'hui</button></div>}

      {/* Summary */}
      <div style={{ padding: "12px 16px 0" }}>
        <div style={st.sumC}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
            <div>
              <div style={{ fontSize: 11, color: P.sub, fontWeight: 500, textTransform: "uppercase", letterSpacing: .5 }}>Temps déclaré</div>
              <div style={{ fontSize: 40, fontWeight: 800, color: P.text, letterSpacing: -2, marginTop: 4 }}>{m2h(totMin)}</div>
            </div>
            <div style={{ textAlign: "right", marginBottom: 6 }}>
              <div style={{ fontSize: 14, color: P.muted }}>sur {H_OBJ[pr.contrat] || DEFAULT_OBJ_HOURS}h</div>
              <div style={{ fontSize: 12, color: P.sub, marginTop: 2 }}>prévues</div>
            </div>
          </div>
          <div style={{ marginTop: 12, height: 6, borderRadius: 3, background: P.card, overflow: "hidden" }}>
            <div style={{ height: "100%", borderRadius: 3, background: pct >= 100 ? P.teal : P.blue, width: `${pct}%`, transition: "width .4s" }} />
          </div>
          <div style={{ marginTop: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              {wd.valide ? (<><div style={{ width: 8, height: 8, borderRadius: 4, background: P.teal }} /><span style={{ fontSize: 12, fontWeight: 600, color: P.teal }}>Envoyé{wd.valideA ? ` le ${new Date(wd.valideA).toLocaleDateString("fr-FR")}` : ""}</span></>) : (<><div style={{ width: 8, height: 8, borderRadius: 4, background: P.orange }} /><span style={{ fontSize: 12, fontWeight: 600, color: P.orange }}>Non envoyé</span></>)}
            </div>
            <span style={{ fontSize: 11, color: P.muted }}>{wd.jours.filter(j => !j.absence && (j.arrivee || j.depart)).length} jour{wd.jours.filter(j => !j.absence && (j.arrivee || j.depart)).length > 1 ? "s" : ""} saisis</span>
          </div>
        </div>
      </div>

      <div style={st.body}>
        {tab === "heures" && (<>
          {showQ && cur && ti >= 0 && !wd.jours[ti].absence && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: P.sub, marginBottom: 8 }}>Aujourd'hui — {JOURS[ti]}</div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => pointer(ti, "arrivee")} style={{ ...st.actBtn, ...(wd.jours[ti].arrivee ? { background: P.tealDim, border: `1.5px solid ${P.teal}40` } : {}) }}>
                  {wd.jours[ti].arrivee ? <ICheck size={18} /> : <span style={{ fontSize: 18, color: P.teal }}>↓</span>}
                  <span style={{ fontSize: 13, fontWeight: 600, color: wd.jours[ti].arrivee ? P.teal : P.text }}>Arrivée</span>
                  {wd.jours[ti].arrivee && <span style={{ fontSize: 12, fontWeight: 600, color: P.teal }}>{wd.jours[ti].arrivee}</span>}
                </button>
                <button onClick={() => pointer(ti, "depart")} style={{ ...st.actBtn, ...(wd.jours[ti].depart ? { background: "rgba(59,130,246,.1)", border: `1.5px solid ${P.blue}40` } : {}) }}>
                  {wd.jours[ti].depart ? <ICheck size={18} color={P.blue} /> : <span style={{ fontSize: 18, color: P.teal }}>↑</span>}
                  <span style={{ fontSize: 13, fontWeight: 600, color: wd.jours[ti].depart ? P.blue : P.text }}>Départ</span>
                  {wd.jours[ti].depart && <span style={{ fontSize: 12, fontWeight: 600, color: P.blue }}>{wd.jours[ti].depart}</span>}
                </button>
              </div>
            </div>
          )}

          {wd.jours.map((j, i) => {
            if (j.absence) return <div key={i} style={st.dc}><div style={st.dRow}><span style={st.dN}>{JOURS[i]}</span><span style={st.absP}>{j.motif === "Autre" ? (j.motifAutre || "Absence") : j.motif}</span></div></div>;
            const n = cNet(j.arrivee, j.depart, pr); const isT = cur && i === ti; const ok2 = j.arrivee && j.depart;
            return (<div key={i} style={{ ...st.dc, ...(isT ? { border: `1.5px solid ${P.teal}`, boxShadow: `0 0 20px ${P.teal}15` } : {}) }}>
              <div style={st.dRow}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={st.dN}>{JOURS[i]}</span>
                  {isT && <span style={{ fontSize: 9, fontWeight: 700, color: P.teal, background: P.tealDim, padding: "2px 8px", borderRadius: 8 }}>Aujourd'hui</span>}
                </div>
                {ok2 && <span style={st.netP}>{m2h(n)}</span>}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 6, alignItems: "center", marginTop: 8, paddingRight: 2 }}>
                <div><div style={st.iL}>Arrivée</div><input type="time" value={j.arrivee} onChange={e => mj(i, "arrivee", e.target.value)} style={st.tI} /></div>
                <div style={{ color: P.dim, marginTop: 18, fontSize: 12 }}>→</div>
                <div><div style={st.iL}>Départ</div><input type="time" value={j.depart} onChange={e => mj(i, "depart", e.target.value)} style={st.tI} /></div>
              </div>
              {ok2 && <div style={{ fontSize: 12, color: P.sub, marginTop: 6 }}>Pause {m2h(cPause(j.arrivee, j.depart, pr))} · Net {m2h(n)}</div>}
            </div>);
          })}
          <div style={{ fontSize: 12, color: P.muted, textAlign: "center", marginTop: 8, marginBottom: 8 }}>Pauses : {pr.pauseMatinHeure || DEFAULT_PAUSE_MATIN_HEURE}–{pr.pauseMatinFin || DEFAULT_PAUSE_MATIN_FIN} + {pr.pauseMidiDebut || DEFAULT_PAUSE_MIDI_DEBUT}–{pr.pauseMidiFin || DEFAULT_PAUSE_MIDI_FIN}</div>
        </>)}

        {tab === "absences" && (<>
          <p style={{ fontSize: 13, color: P.sub, marginBottom: 16 }}>Sélectionnez les jours d'absence.</p>
          {wd.jours.map((j, i) => (<div key={i} style={st.dc}>
            <label style={{ display: "flex", alignItems: "center", gap: 14, cursor: "pointer" }}>
              <input type="checkbox" checked={j.absence} onChange={e => mj(i, "absence", e.target.checked)} style={{ width: 22, height: 22, accentColor: P.teal, flexShrink: 0 }} />
              <span style={{ fontWeight: 600, fontSize: 15, color: P.text }}>{JOURS[i]}</span>
            </label>
            {j.absence && (<div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${P.border}` }}>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{MOTIFS.map(m => <button key={m} onClick={() => mj(i, "motif", m)} style={{ ...st.mP, ...(j.motif === m ? { background: P.teal, color: P.bg } : {}) }}>{m}</button>)}</div>
              {j.motif === "Autre" && <input type="text" placeholder="Précisez…" value={j.motifAutre} onChange={e => mj(i, "motifAutre", e.target.value)} style={{ ...st.fi, marginTop: 10 }} />}
            </div>)}
          </div>))}
        </>)}

        {tab === "historique" && (<>
          <div style={{ fontSize: 18, fontWeight: 700, color: P.text, marginBottom: 4 }}>{MOIS[new Date().getMonth()]}</div>
          <div style={{ fontSize: 13, color: P.sub, marginBottom: 14 }}>Synthèse mensuelle</div>
          <div style={st.sumC}>
            {/* Heures cumulées */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
              <div>
                <div style={{ fontSize: 11, color: P.sub, textTransform: "uppercase", letterSpacing: .5 }}>Cumulé</div>
                <div style={{ fontSize: 32, fontWeight: 800, color: P.text, marginTop: 4, letterSpacing: -1 }}>{m2h(mTot)}</div>
              </div>
              <div style={{ textAlign: "right", marginBottom: 4 }}>
                <div style={{ fontSize: 14, color: P.muted }}>sur {m2h(mObj)}</div>
                <div style={{ fontSize: 11, color: P.sub, marginTop: 1 }}>{stats.length} semaine{stats.length > 1 ? "s" : ""}</div>
              </div>
            </div>
            {/* Progress bar */}
            <div style={{ marginTop: 14, height: 8, borderRadius: 4, background: "rgba(255,255,255,.06)", overflow: "hidden" }}>
              <div style={{ height: "100%", borderRadius: 4, background: mPct >= 100 ? P.teal : P.blue, width: `${mPct}%`, transition: "width .4s ease" }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
              <span style={{ fontSize: 11, color: P.muted }}>{mPct}%</span>
              <span style={{ fontSize: 11, color: P.muted }}>{m2h(mObj)}</span>
            </div>
            {/* Solde */}
            {stats.length > 0 && (
              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", borderRadius: 14, background: mDiff > 0 ? P.tealDim : mDiff < 0 ? "rgba(251,191,36,.08)" : "rgba(59,130,246,.08)", marginTop: 12 }}>
                <div style={{ width: 8, height: 8, borderRadius: 4, background: mDiff > 0 ? P.teal : mDiff < 0 ? P.orange : P.blue }} />
                <span style={{ fontSize: 13, fontWeight: 600, color: mDiff > 0 ? P.teal : mDiff < 0 ? P.orange : P.blue }}>{mDiff > 0 ? `+${m2h(mDiff)} heures sup.` : mDiff < 0 ? `${m2h(Math.abs(mDiff))} heures restantes` : "Objectif atteint"}</span>
              </div>
            )}
            {/* Absences */}
            {mAbsTotal > 0 && (
              <div style={{ marginTop: 16, paddingTop: 14, borderTop: `1px solid ${P.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: P.text }}>Absences</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: P.orange }}>{mAbsTotal} jour{mAbsTotal > 1 ? "s" : ""}</span>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {mAbsDetail.map(([motif, count]) => (
                    <div key={motif} style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(251,191,36,.06)", padding: "5px 12px", borderRadius: 999, border: `1px solid rgba(251,191,36,.12)` }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: P.orange }}>{count}</span>
                      <span style={{ fontSize: 12, color: P.sub }}>{motif}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
          {stats.length > 0 && <div style={{ ...st.sumC, marginTop: 12 }}><div style={{ fontSize: 13, fontWeight: 600, color: P.text, marginBottom: 14 }}>Heures par semaine</div><Chart /></div>}
          <div style={{ marginTop: 16, fontSize: 15, fontWeight: 700, color: P.text, marginBottom: 10 }}>Tous les relevés</div>
          {allSem(pr.nom).length === 0 && <div style={{ color: P.muted, fontSize: 14, padding: 40, textAlign: "center" }}>Aucun relevé</div>}
          {allSem(pr.nom).map(({ cle: c, data: d }) => {
            const wt = d.jours.reduce((s, j) => j.absence ? s : s + cNet(j.arrivee, j.depart, pr), 0);
            const al = getLunCle(c); const av = new Date(al.getTime() + 4 * MS_PER_DAY); const wn = parseInt(c.split("-S")[1]);
            return (<button key={c} onClick={() => setArch({ cle: c, data: d })} style={st.archI}>
              <div style={{ flex: 1 }}><div style={{ fontSize: 13, fontWeight: 800, color: P.teal, letterSpacing: .5 }}>SEMAINE {wn}</div><div style={{ fontSize: 13, color: P.text, fontWeight: 600, marginTop: 2 }}>{fC(al)} – {fC(av)}</div><div style={{ fontSize: 12, color: P.sub, marginTop: 3 }}>{m2h(wt)} déclarées</div></div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>{d.valide && <ICheck size={14} />}<IDoc size={18} /><span style={{ color: P.dim, fontSize: 20 }}>›</span></div>
            </button>);
          })}
          <div style={{ marginTop: 28, paddingTop: 20, borderTop: `1px solid ${P.border}` }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: P.sub, marginBottom: 12 }}>Sauvegarde</div>
            <div style={{ display: "flex", gap: 10 }}><button onClick={exporter} style={{ ...st.sec, flex: 1 }}>Exporter</button><button onClick={restaurer} style={{ ...st.sec, flex: 1 }}>Restaurer</button></div>
            <div style={{ fontSize: 11, color: P.dim, marginTop: 10, lineHeight: 1.5 }}>Exportez vos données régulièrement.</div>
          </div>
        </>)}
      </div>

      {tab === "heures" && hasD && <div style={st.fCTA}><button onClick={valider} style={{ ...st.cta, width: "100%" }}>Valider et envoyer</button></div>}

      <div style={st.tabBar}>
        <div style={st.tabIn}>
          {[{ id: "heures", l: "Heures" }, { id: "absences", l: "Absences" }, { id: "historique", l: "Historique" }].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{ ...st.tabB, ...(tab === t.id ? st.tabA : {}) }}>
              {t.id === "heures" && <IClock color={tab === t.id ? P.teal : P.muted} size={21} />}
              {t.id === "absences" && <ICalX color={tab === t.id ? P.teal : P.muted} size={21} />}
              {t.id === "historique" && <IChart color={tab === t.id ? P.teal : P.muted} size={21} />}
              <span style={{ fontSize: 10, fontWeight: tab === t.id ? 700 : 400 }}>{t.l}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}
